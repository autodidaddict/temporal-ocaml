name: ci

on:
  push:
    branches: [main]
  pull_request:

# Linux only for now. macOS and Windows need per-platform native link flags and
# path/toolchain handling for the Rust bridge; add them back once that's real.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # protoc is a real system dependency: sdk-core's proto crate runs
      # tonic-prost-build at compile time.
      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"

      - uses: dtolnay/rust-toolchain@stable

      # Cache the (large) sdk-core dependency compile.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/temporal_bridge

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"

      - name: Install OCaml deps
        run: opam install . --deps-only --yes

      # cargo is decoupled from dune: build+stage the staticlib first.
      - name: Build Rust bridge
        shell: bash
        run: ./scripts/build-bridge.sh

      - name: Build
        run: opam exec -- dune build examples/ecommerce/main.exe
