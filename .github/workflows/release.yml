name: release

# Precompile per (os, arch) and publish native artifacts on tag push. This is
# the same "build once per platform, ship prebuilt" strategy Temporal's own
# Python/TS/Ruby/.NET SDKs use on top of this same sdk-core — no end user ever
# needs a Rust toolchain.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux only for now — the Rust bridge build isn't cross-platform yet
          # (macOS/Windows need per-platform link flags + path handling).
          - name: linux-x86_64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/temporal_bridge

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"

      - name: Install OCaml deps
        run: opam install . --deps-only --yes

      # cargo is decoupled from dune: build+stage the staticlib first.
      - name: Build Rust bridge
        shell: bash
        run: ./scripts/build-bridge.sh

      - name: Build (release)
        run: opam exec -- dune build --profile release examples/ecommerce/main.exe

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          bin=_build/default/examples/ecommerce/main.exe
          arch=_build/default/lib/libtemporal_core_bridge.a
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$bin" "dist/temporal-demo-${{ matrix.name }}.exe"
          else
            cp "$bin" "dist/temporal-demo-${{ matrix.name }}"
          fi
          # Also ship the reusable static bridge archive so downstream OCaml
          # projects can link it without a Rust toolchain.
          cp "$arch" "dist/libtemporal_core_bridge-${{ matrix.name }}.a"

      - uses: actions/upload-artifact@v4
        with:
          name: temporal-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -R dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
